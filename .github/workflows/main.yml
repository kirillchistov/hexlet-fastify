name: hexlet-fastify

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: make install
      
      - name: Run linter
        run: make lint
      
      - name: Run tests
        run: make test